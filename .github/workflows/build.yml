name: build

on: [push, pull_request]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW-w64
        run: sudo apt-get install -y mingw-w64

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build
        run: cmake --build build
